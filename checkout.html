<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout - Volta</title>
    <link rel="icon" href="img/favico.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/checkout.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo"><img src="img/logo.png" alt="Volta Logo"
                    style="height: 30px; display: block;"></a>
            <ul class="nav-links">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link">Shop</a></li>
                <li><a href="index.html#about" class="nav-link">About Us</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
        </div>
    </nav>

    <div class="checkout-wrap">
        <div class="container">
            <form id="checkout-form" class="checkout-grid">

                <!-- Formulation details -->
                <div class="checkout-form-container">
                    <h2>Billing Details</h2>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="first-name">First Name</label>
                            <input type="text" id="first-name" required>
                        </div>
                        <div class="form-group">
                            <label for="last-name">Last Name</label>
                            <input type="text" id="last-name" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" required>
                    </div>

                    <div class="form-group">
                        <label for="phone">Phone Number</label>
                        <input type="tel" id="phone" required>
                    </div>

                    <div class="form-group">
                        <label for="address">Street Address</label>
                        <input type="text" id="address" placeholder="123 Table Tennis Street" required>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="city">City</label>
                            <input type="text" id="city" required>
                        </div>
                        <div class="form-group">
                            <label for="zipcode">Postal / Zip Code</label>
                            <input type="text" id="zipcode" required>
                        </div>
                    </div>

                    <div class="form-group checkbox-group" style="margin-top: 1.5rem;">
                        <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                            <input type="checkbox" id="ship-different" style="width: auto;">
                            <span>Ship to a different address?</span>
                        </label>
                    </div>

                    <!-- Different Shipping Address Section -->
                    <div id="shipping-address-container"
                        style="display: none; padding-top: 1rem; border-top: 1px dashed rgba(255, 255, 255, 0.1); margin-top: 1rem;">
                        <h3 style="margin-bottom: 1rem; color: var(--text-primary); font-size: 1.2rem;">Shipping
                            Details</h3>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ship-first-name">First Name</label>
                                <input type="text" id="ship-first-name">
                            </div>
                            <div class="form-group">
                                <label for="ship-last-name">Last Name</label>
                                <input type="text" id="ship-last-name">
                            </div>
                        </div>
                        <div class="form-group">
                            <label for="ship-address">Street Address</label>
                            <input type="text" id="ship-address" placeholder="123 Table Tennis Street">
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="ship-city">City</label>
                                <input type="text" id="ship-city">
                            </div>
                            <div class="form-group">
                                <label for="ship-zipcode">Postal / Zip Code</label>
                                <input type="text" id="ship-zipcode">
                            </div>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="notes">Order Notes (Optional)</label>
                        <input type="text" id="notes" placeholder="Notes about your order">
                    </div>
                </div>

                <!-- Order Sidebar -->
                <div class="order-summary-container">
                    <h2>Your Order</h2>
                    <div class="summary-items" id="checkout-summary-items">
                        <!-- Dynamic items -->
                    </div>

                    <div class="summary-totals">
                        <div class="summary-row">
                            <span>Subtotal</span>
                            <span id="checkout-subtotal">Rs. 0</span>
                        </div>
                        <div class="summary-row">
                            <span>Shipping</span>
                            <span>Rs. 250</span>
                        </div>
                        <div class="summary-row total">
                            <span>Total</span>
                            <span id="checkout-total">Rs. 0</span>
                        </div>
                    </div>

                    <div class="payment-method-container"
                        style="margin-top: 2rem; padding: 1.5rem; background: var(--surface-color-2); border-radius: var(--border-radius-sm);">
                        <h3 style="margin-bottom: 1rem; color: var(--text-primary); font-size: 1.2rem;">Payment
                            Method</h3>
                        <div class="form-group checkbox-group" style="margin-bottom: 0;">
                            <label style="display: flex; align-items: center; gap: 10px; cursor: pointer;">
                                <input type="radio" name="payment-method" id="payment-cod" checked style="width: auto;">
                                <span>Cash on Delivery</span>
                            </label>
                            <p
                                style="font-size: 0.85rem; color: var(--text-secondary); margin-top: 0.5rem; padding-left: 1.6rem;">
                                Pay with cash upon delivery.</p>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary btn-block" style="margin-top: 1.5rem;">Place
                        Order</button>

                </div>

            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script src="js/checkout.js"></script>
</body>

</html>
