<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details - Volta</title>
    <link rel="icon" href="img/favico.png" type="image/x-icon">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">

    <!-- CSS -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/product.css">
</head>

<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container nav-content">
            <a href="index.html" class="logo"><img src="img/logo.png" alt="Volta Logo"
                    style="height: 30px; display: block;"></a>
            <ul class="nav-links">
                <li><a href="index.html#home" class="nav-link">Home</a></li>
                <li><a href="shop.html" class="nav-link active">Shop</a></li>
                <li><a href="index.html#about" class="nav-link">About Us</a></li>
                <li><a href="index.html#contact" class="nav-link">Contact</a></li>
            </ul>
            <div class="nav-actions">
                <button id="open-cart-btn" class="cart-btn" aria-label="Open Cart">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="9" cy="21" r="1"></circle>
                        <circle cx="20" cy="21" r="1"></circle>
                        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"></path>
                    </svg>
                    <span id="cart-count" class="cart-count">0</span>
                </button>
                <div id="hamburger-menu" class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </div>
        </div>
    </nav>

    <div class="product-details-wrap">
        <div class="container">
            <div id="product-detail-container">
                <!-- Details dynamically loaded here based on URL parameter -->
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer id="contact">
        <div class="container">
            <div class="footer-content">
                <div class="footer-brand">
                    <a href="index.html" class="logo"><img src="img/logo.png" alt="Volta Logo"
                            style="height: 30px; display: block;"></a>
                    <p>Elevating the sport of table tennis with precision-engineered equipment for players of all
                        levels.</p>
                </div>
                <div class="footer-links">
                    <h4>Quick Links</h4>
                    <a href="index.html#home">Home</a>
                    <a href="shop.html">Shop</a>
                    <a href="index.html#about">About Us</a>
                    <a href="index.html#contact">Contact</a>
                </div>
                <!-- Optional newsletter section -->
            </div>
            <div class="footer-bottom">
                &copy; 2026 Volta Sports. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Cart Overlay & Drawer -->
    <div id="cart-overlay" class="cart-overlay"></div>
    <div id="cart-drawer" class="cart-drawer">
        <!-- Inside same as before -->
        <div class="cart-header">
            <h2>Your Cart</h2>
            <button id="close-cart-btn" class="close-btn" aria-label="Close Cart">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
        </div>
        <div id="cart-items" class="cart-items">
            <!-- Cart items -->
        </div>
        <div class="cart-footer">
            <div class="cart-total">
                <span>Total:</span>
                <span id="cart-total-price">Rs. 0.00</span>
            </div>
            <button class="btn btn-primary btn-block" onclick="window.location.href='checkout.html'">Proceed to
                Checkout</button>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/products.js"></script>
    <script src="js/app.js"></script>
    <script src="js/product-details.js"></script>
</body>

</html>
